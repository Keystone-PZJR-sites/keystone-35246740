name: Deploy to Cloudflare Workers

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Deploy
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build with OpenNext
        run: npx opennextjs-cloudflare build
        env:
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}
      
      - name: Set Cloudflare Worker Secrets
        run: |
          echo "${{ secrets.API_KEY }}" | npx wrangler secret put API_KEY --name ${{ github.event.repository.name }}
          echo "${{ secrets.API_URL }}" | npx wrangler secret put API_URL --name ${{ github.event.repository.name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --name ${{ github.event.repository.name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
